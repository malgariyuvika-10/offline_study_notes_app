stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

before_script:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt

# -------------------------
# Lint
# -------------------------
lint:
  stage: lint
  script:
    - python -m ruff check .

quality:
  stage: lint
  script:
    - python -m flake8 app
    - python -m pylint app
    - python -m vulture app

pyupgrade:
  stage: lint
  script:
    - python -m pyupgrade --py312-plus app/**/*.py

# -------------------------
# Format
# -------------------------
format:
  stage: format
  script:
    - python -m black --check .

# -------------------------
# Type Check
# -------------------------
type_check:
  stage: type_check
  script:
    - python -m mypy app

# -------------------------
# Tests
# -------------------------
test:
  stage: test
  script:
    - python -m pytest tests

# -------------------------
# Coverage
# -------------------------
coverage:
  stage: coverage
  script:
    - python -m pytest --cov=app --cov-report=term --cov-report=xml

# -------------------------
# Security
# -------------------------
bandit_scan:
  stage: security
  script:
    - python -m bandit -r app

semgrep_scan:
  stage: security
  script:
    - python -m semgrep --config=auto .

dependency_audit:
  stage: security
  script:
    - python -m pip_audit
