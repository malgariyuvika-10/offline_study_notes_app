stages:
  - lint
  - format
  - type_check
  - test
  - security

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"
  # FIX: Using single quotes prevents YAML from interpreting backslashes as escape sequences
  PYTHON: 'C:\Users\Hepsibha\AppData\Local\Python\pythoncore-3.14-64\python.exe'

default:
  tags:
    - windows  # Directs all jobs to your local Windows shell runner
  before_script:
    - |
      if ($env:PYTHON -and (Test-Path $env:PYTHON)) {
        $env:PYTHON_EXE = $env:PYTHON
        $env:PYTHON_USE_LAUNCHER = "0"
      }
      elseif (Get-Command python -ErrorAction SilentlyContinue) {
        $env:PYTHON_EXE = "python"
        $env:PYTHON_USE_LAUNCHER = "0"
      }
      elseif (Get-Command py -ErrorAction SilentlyContinue) {
        $env:PYTHON_EXE = "py"
        $env:PYTHON_USE_LAUNCHER = "1"
      }
      else {
        throw "Python was not found. Install Python for all users, add it to the System PATH, restart the GitLab Runner service, or set CI/CD variable PYTHON to the full python.exe path."
      }
      function Invoke-CiPython {
        if ($env:PYTHON_USE_LAUNCHER -eq "1") {
          & py -3 @args
        }
        else {
          & $env:PYTHON_EXE @args
        }
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      }
    - |
      $PythonScripts = (Invoke-CiPython -c "import sysconfig; print(sysconfig.get_path('scripts'))").Trim()
      if ($PythonScripts -and (Test-Path $PythonScripts)) {
        $env:PATH = "$PythonScripts;$env:PATH"
      }
    - Invoke-CiPython --version
    - Invoke-CiPython -m pip install --upgrade pip
    - Invoke-CiPython -m pip install -r requirements.txt

lint:
  stage: lint
  script:
    - Invoke-CiPython -m pip install ruff flake8 pylint vulture pyupgrade
    - Invoke-CiPython -m ruff check .
    - Invoke-CiPython -m flake8 app --max-line-length=88
    # FIX: Set PYTHONPATH so app modules find each other, and disable docstring checks/built-in warnings
    - $env:PYTHONPATH = "app;$env:PYTHONPATH"
    - Invoke-CiPython -m pylint app --disable=C0114,C0116,W0621,W0622,W0718 --exit-zero
    - Invoke-CiPython -m vulture app whitelist.py
    # FIX: Use a PowerShell pipeline to expand and process files recursively without breaking on Windows wildcards
    - Get-ChildItem -Path app -Filter *.py -Recurse | ForEach-Object { Invoke-CiPython -m pyupgrade --py312-plus $_.FullName }

format:
  stage: format
  script:
    - Invoke-CiPython -m pip install ruff
    - Invoke-CiPython -m ruff format --check .

type_check:
  stage: type_check
  script:
    - Invoke-CiPython -m pip install mypy
    - Invoke-CiPython -m mypy app

test:
  stage: test
  script:
    - Invoke-CiPython -m pip install pytest pytest-cov
    # Change "tests" to "." to scan the entire project, or to your specific folder name
    - Invoke-CiPython -m pytest . --cov=app --cov-report=term --cov-report=xml

security:
  stage: security
  script:
    - Invoke-CiPython -m pip install bandit pip-audit
    - Invoke-CiPython -m bandit -r app
    - Invoke-CiPython -m pip-audit