stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

image: python:3.12

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

lint:
  stage: lint
  script:
    - ruff check .

format:
  stage: format
  script:
    - black --check .

type_check:
  stage: type_check
  script:
    - mypy app

test:
  stage: test
  script:
    - pytest tests

coverage:
  stage: coverage
  script:
    - pytest --cov=app --cov-report=term --cov-report=xml

security:
  stage: security
  script:
    - bandit -r app