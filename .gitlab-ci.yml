stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

# -------------------------
# Global setup (Windows-safe Python detection)
# -------------------------
before_script:
  - python --version || py --version
  - python -m pip install --upgrade pip || py -m pip install --upgrade pip
  - python -m pip install -r requirements.txt || py -m pip install -r requirements.txt

# helper variable idea (not required but useful):
# use: py instead of python if python fails

# -------------------------
# Lint
# -------------------------
lint:
  stage: lint
  script:
    - python -m pip install ruff flake8 pylint vulture
    - python -m ruff check .

quality:
  stage: lint
  script:
    - python -m pip install flake8 pylint vulture
    - python -m flake8 app
    - python -m pylint app
    - python -m vulture app

pyupgrade:
  stage: lint
  script:
    - python -m pip install pyupgrade
    - python -m pyupgrade --py312-plus app

# -------------------------
# Format
# -------------------------
format:
  stage: format
  script:
    - python -m pip install black
    - python -m black --check .

# -------------------------
# Type Check
# -------------------------
type_check:
  stage: type_check
  script:
    - python -m pip install mypy
    - python -m mypy app

# -------------------------
# Tests
# -------------------------
test:
  stage: test
  script:
    - python -m pip install pytest pytest-cov
    - python -m pytest tests

# -------------------------
# Coverage
# -------------------------
coverage:
  stage: coverage
  script:
    - python -m pip install pytest pytest-cov
    - python -m pytest --cov=app --cov-report=term --cov-report=xml

# -------------------------
# Security
# -------------------------
bandit_scan:
  stage: security
  script:
    - python -m pip install bandit
    - python -m bandit -r app

semgrep_scan:
  stage: security
  script:
    - python -m pip install semgrep
    - python -m semgrep --config=auto .

dependency_audit:
  stage: security
  script:
    - python -m pip install pip-audit
    - python -m pip_audit