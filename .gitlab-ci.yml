stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

before_script:
  - |
    if (Get-Command python -ErrorAction SilentlyContinue) {
      python --version
    } elseif (Get-Command py -ErrorAction SilentlyContinue) {
      py --version
    } else {
      Write-Host "Python is not installed on this runner"
      exit 1
    }

  - |
    if (Get-Command python -ErrorAction SilentlyContinue) {
      python -m pip install --upgrade pip
      python -m pip install -r requirements.txt
    } else {
      py -m pip install --upgrade pip
      py -m pip install -r requirements.txt
    }

# -------------------------
# Lint
# -------------------------
lint:
  stage: lint
  script:
    - python -m pip install ruff flake8 pylint vulture
    - python -m ruff check .

# -------------------------
quality:
  stage: lint
  script:
    - python -m flake8 app
    - python -m pylint app
    - python -m vulture app

# -------------------------
pyupgrade:
  stage: lint
  script:
    - python -m pip install pyupgrade
    - python -m pyupgrade --py312-plus app

# -------------------------
format:
  stage: format
  script:
    - python -m pip install black
    - python -m black --check .

# -------------------------
type_check:
  stage: type_check
  script:
    - python -m pip install mypy
    - python -m mypy app

# -------------------------
test:
  stage: test
  script:
    - python -m pip install pytest pytest-cov
    - python -m pytest tests

# -------------------------
coverage:
  stage: coverage
  script:
    - python -m pytest --cov=app --cov-report=term --cov-report=xml

# -------------------------
bandit_scan:
  stage: security
  script:
    - python -m pip install bandit
    - python -m bandit -r app

semgrep_scan:
  stage: security
  script:
    - python -m pip install semgrep
    - python -m semgrep --config=auto .

dependency_audit:
  stage: security
  script:
    - python -m pip install pip-audit
    - python -m pip_audit