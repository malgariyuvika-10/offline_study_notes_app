stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

image: python:3.12

before_script:
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt

# -------------------------
# Lint
# -------------------------
lint:
  stage: lint
  script:
    - ruff check .

quality:
  stage: lint
  script:
    - flake8 app
    - pylint app
    - vulture app

pyupgrade:
  stage: lint
  script:
    - pyupgrade --py312-plus app/**/*.py

# -------------------------
# Format
# -------------------------
format:
  stage: format
  script:
    - black --check .

# -------------------------
# Type Check
# -------------------------
type_check:
  stage: type_check
  script:
    - mypy app

# -------------------------
# Tests
# -------------------------
test:
  stage: test
  script:
    - pytest tests

# -------------------------
# Coverage
# -------------------------
coverage:
  stage: coverage
  script:
    - pytest --cov=app --cov-report=term --cov-report=xml

# -------------------------
# Security
# -------------------------
bandit_scan:
  stage: security
  script:
    - bandit -r app

semgrep_scan:
  stage: security
  script:
    - semgrep --config=auto .

dependency_audit:
  stage: security
  script:
    - pip-audit