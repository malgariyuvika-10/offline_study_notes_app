image: python:3.12

stages:
  - lint
  - format
  - type_check
  - test
  - coverage
  - security

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt

# -------------------------
# Lint
# -------------------------
lint:
  stage: lint
  script:
    - pip install ruff flake8 pylint vulture
    - ruff check .

quality:
  stage: lint
  script:
    - flake8 app
    - pylint app
    - vulture app

pyupgrade:
  stage: lint
  script:
    - pip install pyupgrade
    - pyupgrade --py312-plus app

# -------------------------
# Format
# -------------------------
format:
  stage: format
  script:
    - pip install black
    - black --check .

# -------------------------
# Type Check
# -------------------------
type_check:
  stage: type_check
  script:
    - pip install mypy
    - mypy app

# -------------------------
# Tests
# -------------------------
test:
  stage: test
  script:
    - pip install pytest pytest-cov
    - pytest tests

# -------------------------
# Coverage
# -------------------------
coverage:
  stage: coverage
  script:
    - pytest --cov=app --cov-report=term --cov-report=xml

# -------------------------
# Security
# -------------------------
bandit_scan:
  stage: security
  script:
    - pip install bandit
    - bandit -r app

semgrep_scan:
  stage: security
  script:
    - pip install semgrep
    - semgrep --config=auto .

dependency_audit:
  stage: security
  script:
    - pip install pip-audit
    - pip-audit